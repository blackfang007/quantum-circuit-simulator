<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Circuit Simulator</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f9f8f6;
      --surface: #ffffff;
      --border:  #e2e0db;
      --text:    #1a1a18;
      --muted:   #6b6a66;
      --wire:    #9b9994;
      --label:   #6b6a66;
      --accent:  #534AB7;
      --radius:  10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1a1a18;
        --surface: #242422;
        --border:  #3a3a38;
        --text:    #e8e6e0;
        --muted:   #9b9994;
        --wire:    #5a5a58;
        --label:   #9b9994;
      }
    }

    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

    /* ── Layout ── */
    #app     { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    h1       { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
    .main    { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
    @media (max-width: 700px) { .main { grid-template-columns: 1fr; } }

    /* ── Toolbar ── */
    .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; align-items: center; }
    .section-label { font-size: 11px; color: var(--muted); margin-right: 2px; }
    .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    /* Gate / action buttons */
    .btn {
      padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: monospace; font-size: 12px;
      font-weight: 500; cursor: pointer; transition: background 0.12s;
    }
    .btn:hover { background: var(--bg); }
    .btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .btn-run   { font-family: system-ui; font-size: 13px; background: var(--accent); color: white; border-color: var(--accent); }
    .btn-run:hover { opacity: 0.9; }

    /* ── Qubit row & presets ── */
    .top-controls { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .field-group  { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    select {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--text); font-size: 12px;
    }
    .presets { display: flex; gap: 5px; flex-wrap: wrap; }
    .preset-btn {
      padding: 4px 9px; font-size: 11px; border: 1px solid var(--border);
      border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer;
    }
    .preset-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Circuit area ── */
    .circuit-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow-x: auto;
    }
    #circuit-svg { display: block; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* ── Export ── */
    .export-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    #export-output {
      width: 100%; height: 120px; margin-top: 8px; font-family: monospace; font-size: 11px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; color: var(--text); resize: vertical;
    }

    /* ── State panel ── */
    #state-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; font-size: 12px;
    }

    /* Tab row */
    .tab-row { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab {
      padding: 4px 10px; font-size: 11px; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--muted); background: transparent;
    }
    .tab.active { background: var(--surface); border-color: var(--muted); color: var(--text); }

    /* State vector list */
    .sv-list { display: flex; flex-direction: column; gap: 10px; }
    .sv-row  { display: flex; align-items: flex-start; gap: 8px; }
    .sv-basis { font-family: monospace; font-weight: 500; min-width: 38px; margin-top: 2px; }
    .sv-right { flex: 1; }
    .sv-bar-row { display: flex; align-items: center; gap: 6px; }
    .sv-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .sv-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.25s; }
    .sv-pct { min-width: 34px; text-align: right; color: var(--muted); }
    .sv-amp { font-family: monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Bloch sphere */
    .bloch-wrap { display: flex; justify-content: center; }
    .bloch-info { font-family: monospace; font-size: 11px; color: var(--muted); margin-top: 6px; text-align: center; }
    .bloch-note { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* Histogram */
    .hist-title { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .hist-bars  { display: flex; gap: 8px; align-items: flex-end; height: 100px; }
    .hist-item  { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .hist-bar-wrap { height: 70px; width: 100%; display: flex; align-items: flex-end; }
    .hist-bar   { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 1px; }
    .hist-label { font-family: monospace; font-size: 10px; color: var(--muted); }
    .hist-count { font-size: 10px; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">
  <h1>Quantum Circuit Simulator</h1>

  <div class="top-controls">
    <div class="field-group">
      <span>Qubits:</span>
      <select id="qubit-count">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
    </div>
    <div class="presets">
      <span class="section-label">Presets:</span>
      <button class="preset-btn" data-preset="bell">Bell</button>
      <button class="preset-btn" data-preset="ghz">GHZ</button>
      <button class="preset-btn" data-preset="qft2">QFT</button>
      <button class="preset-btn" data-preset="grover2">Grover</button>
    </div>
  </div>

  <div class="toolbar">
    <span class="section-label">Gate:</span>
    <!-- single-qubit -->
    <button class="btn active" data-gate="H">H</button>
    <button class="btn" data-gate="X">X</button>
    <button class="btn" data-gate="Y">Y</button>
    <button class="btn" data-gate="Z">Z</button>
    <button class="btn" data-gate="S">S</button>
    <button class="btn" data-gate="T">T</button>
    <button class="btn" data-gate="Sdg">S†</button>
    <button class="btn" data-gate="Tdg">T†</button>
    <button class="btn" data-gate="Rz">Rz</button>
    <div class="divider"></div>
    <!-- two-qubit -->
    <button class="btn" data-gate="CNOT">CNOT</button>
    <button class="btn" data-gate="SWAP">SWAP</button>
    <div class="divider"></div>
    <!-- measure -->
    <button class="btn" data-gate="M" style="color:#993556">M</button>
    <div class="divider"></div>
    <!-- actions -->
    <button class="btn btn-run" id="btn-run">▶ Run</button>
    <button class="btn" id="btn-undo">↩ Undo</button>
    <button class="btn" id="btn-clear">Clear</button>
  </div>

  <div class="main">
    <div>
      <div class="circuit-card">
        <svg id="circuit-svg"></svg>
      </div>
      <p class="hint">Click a wire cell to place the selected gate. Click a gate to remove it.</p>
      <div class="export-row">
        <button class="btn" id="btn-qasm">Export QASM</button>
        <button class="btn" id="btn-qiskit">Export Qiskit</button>
      </div>
      <textarea id="export-output" hidden placeholder="Export output appears here…"></textarea>
    </div>

    <div id="state-panel"></div>
  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
