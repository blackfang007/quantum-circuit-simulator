<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Circuit Simulator</title>
  <style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; }

/* ── Design tokens ── */
:root {
  --bg:       #f0eff5;
  --surface:  #ffffff;
  --surface2: #f7f6fb;
  --border:   #e0dff0;
  --text:     #1a1825;
  --muted:    #7c7a96;
  --label:    #9e9bba;
  --wire:     #b0aed0;
  --accent:   #6c5ce7;
  --accent2:  #a29bfe;
  --danger:   #d63031;
  --radius:   10px;
  --font-mono: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
}
html.dark {
  --bg:       #13121f;
  --surface:  #1e1c2e;
  --surface2: #252339;
  --border:   #2e2c45;
  --text:     #e8e6f5;
  --muted:    #8884aa;
  --label:    #6663888;
  --wire:     #3d3a60;
  --accent:   #a29bfe;
  --accent2:  #6c5ce7;
}

/* ── Base ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px;
  min-height: 100vh;
}

/* ── App shell ── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-title {
  font-size: 13px; font-weight: 600; letter-spacing: .04em;
  color: var(--accent); font-family: var(--font-mono);
  margin-right: 8px;
}
.topbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

/* Qubit selector */
.field-group { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
select {
  padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text);
  font-size: 12px; font-family: var(--font-mono);
}

/* Preset pills */
.presets { display: flex; gap: 4px; }
.preset-btn {
  padding: 3px 9px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 20px; background: transparent; color: var(--muted);
  transition: all .12s;
}
.preset-btn:hover { border-color: var(--accent2); color: var(--accent); }

/* Icon buttons */
.icon-btn {
  padding: 4px 10px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 6px; background: transparent; color: var(--muted);
  transition: all .12s;
}
.icon-btn:hover { border-color: var(--muted); color: var(--text); }
.icon-btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
.icon-btn.accent:hover { opacity: .88; }

/* Step controls */
.step-group { display: flex; align-items: center; gap: 4px; }
#step-display {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  padding: 3px 8px; background: color-mix(in srgb, var(--accent) 10%, transparent);
  border-radius: 4px;
}

/* ── Main 3-column area ── */
.workspace {
  display: grid;
  grid-template-columns: 148px 1fr 280px;
  grid-template-rows: 1fr;
  gap: 0;
  flex: 1;
  overflow: hidden;
}

/* ── Left: Gate palette ── */
#palette {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 8px;
}
.palette-group { margin-bottom: 14px; }
.palette-group-label {
  font-size: 10px; font-weight: 600; color: var(--muted);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 6px; padding-left: 2px;
}
.palette-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.palette-gate {
  padding: 6px 4px; font-size: 11px; font-weight: 600;
  font-family: var(--font-mono);
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--surface2);
  color: var(--gate-color, var(--text));
  transition: all .12s;
  user-select: none;
}
.palette-gate:hover { background: color-mix(in srgb, var(--gate-color) 10%, var(--surface2)); border-color: var(--gate-color); }
.palette-gate.selected {
  background: color-mix(in srgb, var(--gate-color) 18%, var(--surface2));
  border-color: var(--gate-color);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--gate-color) 25%, transparent);
}

/* Tooltip */
.gate-tooltip {
  position: fixed; z-index: 9999;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  pointer-events: none; max-width: 220px;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
}
.tt-name  { font-family: var(--font-mono); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tt-desc  { font-size: 12px; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
.tt-matrix { font-family: var(--font-mono); font-size: 11px; color: var(--text);
             background: var(--surface2); padding: 5px 7px; border-radius: 5px;
             white-space: pre-line; }

/* ── Middle: Circuit ── */
.circuit-col {
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.circuit-scroll { flex: 1; overflow: auto; padding: 16px; }
#circuit-svg { display: block; }

/* Drag ghost */
.drag-ghost {
  position: fixed; z-index: 9998;
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  pointer-events: none; opacity: .85;
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
}

/* ── Right: State panel + QASM ── */
.right-col {
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  overflow: hidden;
}

/* State panel */
#state-panel {
  flex: 1; overflow-y: auto;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.sp-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.sp-tab {
  padding: 3px 9px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 5px; background: transparent; color: var(--muted);
}
.sp-tab.on { background: var(--surface2); border-color: var(--muted); color: var(--text); }
.threshold-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted); margin-bottom: 8px; cursor: pointer;
}
.threshold-row input { accent-color: var(--accent); }

/* SV list */
.sv-list { display: flex; flex-direction: column; gap: 9px; }
.sv-row  { display: flex; align-items: flex-start; gap: 7px; }
.sv-row.sv-dim { opacity: .4; }
.sv-basis { font-family: var(--font-mono); font-size: 12px; font-weight: 600; min-width: 36px; margin-top: 2px; }
.sv-right { flex: 1; }
.sv-barrow { display: flex; align-items: center; gap: 5px; }
.sv-track  { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.sv-bar    { height: 100%; border-radius: 4px; transition: width .25s; }
.sv-pct    { min-width: 32px; text-align: right; font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
.sv-amp    { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Bloch */
.bloch-wrap   { display: flex; justify-content: center; margin-bottom: 6px; }
.bloch-coords { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: center; }
.bloch-mag    { font-size: 11px; color: var(--accent); text-align: center; margin-top: 4px; }
.bloch-note   { font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.4; }

/* Histogram */
.hb-title { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.hb-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; overflow-x: auto; }
.hb-col   { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; min-width: 28px; }
.hb-pct   { font-size: 9px; color: var(--muted); font-family: var(--font-mono); min-height: 14px; }
.hb-bar-wrap { height: 70px; width: 100%; display: flex; align-items: flex-end; }
.hb-bar   { width: 100%; border-radius: 3px 3px 0 0; min-height: 1px; transition: height .25s; }
.hb-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); }
.hb-count { font-size: 9px; color: var(--muted); }

/* QASM panel */
#qasm-panel {
  height: 240px; flex-shrink: 0;
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--surface2);
}
.qp-header {
  display: flex; align-items: center; gap: 6px; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.qp-tabs { display: flex; gap: 3px; }
.qp-tab {
  padding: 2px 9px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 5px; background: transparent; color: var(--muted);
}
.qp-tab.on { background: var(--surface2); color: var(--text); border-color: var(--muted); }
.qp-copy {
  font-size: 11px; padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 5px; background: transparent; color: var(--muted);
}
.qp-copy:hover { color: var(--text); }
.qp-code {
  flex: 1; overflow: auto; margin: 0; padding: 10px 12px;
  font-family: var(--font-mono); font-size: 11px; line-height: 1.7;
  color: var(--text); white-space: pre;
  tab-size: 2;
}
/* Syntax highlight */
.qp-code .kw   { color: #a29bfe; }
.qp-code .gate { color: #00cec9; }
.qp-code .cls  { color: #fdcb6e; }
.qp-code .obj  { color: #74b9ff; }
.qp-code .str  { color: #55efc4; }
.qp-code .num  { color: #fd79a8; }
.qp-code .cmt  { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title">⟨ψ| QSIM</span>
    <div class="topbar-divider"></div>

    <div class="field-group">
      Qubits
      <select id="qubit-count">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="topbar-divider"></div>

    <div class="presets">
      <span style="font-size:11px;color:var(--muted)">Presets:</span>
      <button class="preset-btn" data-preset="bell">Bell</button>
      <button class="preset-btn" data-preset="ghz">GHZ</button>
      <button class="preset-btn" data-preset="qft2">QFT</button>
      <button class="preset-btn" data-preset="grover2">Grover</button>
      <button class="preset-btn" data-preset="teleport">Teleport</button>
    </div>

    <div class="topbar-divider"></div>

    <button class="icon-btn accent" id="btn-clear">Clear</button>
    <button class="icon-btn" id="btn-undo">↩ Undo</button>

    <div class="topbar-divider"></div>

    <!-- Step through -->
    <div class="step-group">
      <span style="font-size:11px;color:var(--muted)">Step:</span>
      <button class="icon-btn" id="btn-step-back">◀</button>
      <button class="icon-btn" id="btn-step-fwd">▶</button>
      <button class="icon-btn" id="btn-step-reset">⟳</button>
      <span id="step-display" hidden></span>
    </div>

    <div class="topbar-divider"></div>
    <button class="icon-btn" id="btn-dark">☾ Dark</button>
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Left: palette -->
    <div id="palette"></div>

    <!-- Middle: circuit -->
    <div class="circuit-col">
      <div class="circuit-scroll">
        <svg id="circuit-svg"></svg>
      </div>
    </div>

    <!-- Right: state panel + QASM -->
    <div class="right-col">
      <div id="state-panel"></div>
      <div id="qasm-panel"></div>
    </div>

  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
